.app{display:none;grid-template-columns:250px 1fr;min-height:100vh}
.side{background:linear-gradient(180deg,#1b3f29,#0e2417);color:#cfe8d8;display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh;z-index:10}
.brand{display:flex;align-items:center;gap:7px;padding:10px 6px 18px}.brand .wm{font-size:28px;font-weight:700;letter-spacing:-2px;color:#fff;line-height:1}.brand .ii{position:relative;display:inline-block}.brand .idot{position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--green)}.brand .osbox{background:var(--green);color:#08200f;font-weight:800;font-size:15px;padding:2px 8px;border-radius:9px;line-height:1.2}

.gtoggle{background:#eef7f1;color:var(--muted);border:1px solid var(--line);padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600}.gtoggle.on{background:var(--forest);color:#fff;border-color:var(--forest)}
.side .me .av img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.navlbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1.6px;color:#6f8f7c;padding:14px 12px 6px}
.nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:13px;color:#cfe8d8;text-decoration:none;font-size:14.5px;cursor:pointer;transition:.18s}
.nav a .ic{width:20px;text-align:center;font-size:16px}.nav a:hover{background:rgba(77,242,138,.10);color:#fff}.nav a.active{background:var(--green);color:var(--forest);font-weight:600;box-shadow:0 6px 18px rgba(77,242,138,.32)}
.side .me{margin-top:auto;display:flex;align-items:center;gap:10px;padding:11px;border-radius:14px;background:rgba(255,255,255,.05);font-size:13px}.side .me .av{width:36px;height:36px;border-radius:11px;background:var(--green);color:var(--forest);display:grid;place-items:center;font-weight:800}.side .me small{display:block;color:#8fb09c;font-size:11px}

.top h1{font-size:20px;font-weight:600;letter-spacing:-.5px}.top .sub{color:var(--muted);font-size:12px}
.tw{display:flex;align-items:center;gap:12px}
.priv{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--forest);color:var(--forest);padding:7px 12px;border-radius:30px;font-size:12px;font-weight:600;cursor:pointer}.priv:hover{background:var(--forest);color:var(--green)}
.vtoggle{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:30px;padding:3px;font-size:12px;font-weight:600;flex:none}
.vtoggle a,.vtoggle span{padding:6px 13px;border-radius:30px;cursor:pointer;color:var(--muted);text-decoration:none;transition:.15s}
.vtoggle a:hover{color:var(--forest)}.vtoggle .on{background:var(--forest);color:#fff}
.griH{text-align:right}.griH .n{font-size:19px;font-weight:800;color:var(--forest)}.griH small{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px}
.badge{padding:6px 12px;border-radius:30px;font-weight:700;font-size:12px;color:#fff}
.b-blue{background:linear-gradient(135deg,#6fb0f0,#3f7fc4)}.b-bronze{background:linear-gradient(135deg,#e2a96b,#b76a2e)}.b-silver{background:linear-gradient(135deg,#cdd6df,#8b98a6);color:#2a323a}.b-gold{background:linear-gradient(135deg,#f4d06a,#d7a229);color:#5a4408}
.content{padding:24px 26px 70px;max-width:1100px;width:100%}
.screen{display:none}.screen.show{display:block;animation:rise .35s cubic-bezier(.2,.7,.3,1)}@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.grid{display:grid;gap:18px}.g2{grid-template-columns:1.5fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:1024px){.g2,.g3{grid-template-columns:1fr}.app{grid-template-columns:72px 1fr}.brand .wm,.nav a span:not(.ic),.navlbl,.side .me div{display:none}.brand,.nav a{justify-content:center}}
.tabbar{display:none}.moresheet{display:none}
@media(max-width:760px){.app{grid-template-columns:1fr}.side{display:none}.main{padding-bottom:80px}.top{padding:14px 16px}.tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;height:64px;background:#fff;border-top:1px solid var(--line);align-items:center;justify-content:space-around;z-index:50}.tabbar .tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);text-decoration:none;cursor:pointer;flex:1}.tabbar .tab .i{font-size:20px}.tabbar .tab.on{color:var(--forest);font-weight:700}.tabbar .tab.on .i{color:var(--green-d)}.moresheet.show{display:block;position:fixed;inset:0;z-index:60}.moresheet-bg{position:absolute;inset:0;background:rgba(12,26,18,.45)}.moresheet-panel{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:20px 20px 0 0;padding:18px}.morelink{display:block;padding:13px 6px;font-size:15px;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}

.top{padding:10px 15px !important;align-items:center;gap:8px}
.top>div:first-child{min-width:0}
.top #sub{display:none}

.card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm)}

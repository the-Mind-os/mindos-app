<style>
:root{--green:#4DF28A;--green-d:#27c768;--forest:#173622;--forest2:#0e2417;--page:#EAF6EE;--cream:#F5F5EE;--ink:#0c1a12;--muted:#5d6f64;--line:#dbe9e0;--white:#fff;--shadow:0 10px 34px rgba(23,54,34,.10);--shadow-sm:0 3px 14px rgba(23,54,34,.07);--radius:20px}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:'Poppins',system-ui,sans-serif;background:var(--page);color:var(--ink);font-weight:400;-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.5}
a{color:inherit}
img{max-width:100%}
.wrap{max-width:960px;margin:0 auto;padding:0 18px}
/* header */
header.top{position:sticky;top:0;z-index:50;background:var(--forest);box-shadow:0 2px 14px rgba(12,26,18,.25)}
.top .wrap{display:flex;align-items:center;justify-content:space-between;height:60px}
.top .logo{height:26px;display:block}
.top .logo img{height:26px;display:block}
.btn{border:none;border-radius:13px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;padding:11px 18px;display:inline-flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;transition:transform .12s ease,box-shadow .12s ease,background .12s ease}
.btn:active{transform:translateY(1px)}
.btn.p{background:var(--green-d);color:#fff;box-shadow:0 8px 20px rgba(39,199,104,.3)}
.btn.p:hover{background:#23b85f}
.btn.g{background:#fff;color:var(--forest);border:1.5px solid var(--line)}
.btn.gh{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.22)}
.btn.sm{padding:9px 14px;font-size:13px;border-radius:11px}
.btn.lg{padding:15px 26px;font-size:15.5px;border-radius:15px}
.btn.full{width:100%}
/* hero */
.hero{background:linear-gradient(160deg,var(--forest),var(--forest2));color:#fff;padding:46px 0 40px;text-align:center}
.hero .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green)}
.hero h1{font-size:32px;line-height:1.14;font-weight:800;margin:10px auto 12px;max-width:640px}
.hero p{color:#bcd6c6;font-size:16px;max-width:560px;margin:0 auto;line-height:1.6}
.hero .cta{margin-top:22px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
@media(max-width:560px){.hero h1{font-size:26px}.hero{padding:34px 0 30px}}
/* sections */
main{padding:30px 0 10px;min-height:50vh}
.sec{margin:0 0 30px}
.sec h2{font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--forest);text-transform:uppercase;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column}
.cm{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.av{flex:none;width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#27c768,#173622);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;overflow:hidden}
.av.lg{width:62px;height:62px;border-radius:16px;font-size:24px}
.av.xl{width:92px;height:92px;border-radius:22px;font-size:34px}
.cm b{display:block;font-size:15px;color:var(--forest);line-height:1.2}
.cm span{display:block;font-size:12.5px;color:var(--muted);margin-top:2px}
.pill{display:inline-block;background:#eaf6ee;color:#2a6b4d;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:8px;width:fit-content}
.ptitle{font-size:16px;font-weight:800;color:var(--forest);line-height:1.25;margin-bottom:4px}
.pout{font-size:13px;color:var(--muted);margin-bottom:8px}
.meta{font-size:12px;color:var(--muted);margin-bottom:5px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
.tag{background:#f1f7f3;border:1px solid var(--line);color:#3a4f43;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:9px}
.new{background:var(--green);color:var(--forest);font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px}
.star{color:#E3B23C}
.seatbar{height:6px;background:#eef3f0;border-radius:6px;overflow:hidden;margin:8px 0 5px}
.seatbar>i{display:block;height:100%;background:linear-gradient(90deg,#27c768,#4DF28A)}
.seatlbl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:10px}
.fr{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:8px}
.prc{font-size:18px;font-weight:800;color:var(--forest)}
.prc span{font-size:12px;color:var(--muted);font-weight:600}
/* detail */
.dhero{background:linear-gradient(160deg,var(--forest),var(--forest2));color:#fff;border-radius:var(--radius);padding:26px 22px;margin-bottom:18px}
.dhero.ctr{text-align:center}
.dhero h1{font-size:26px;font-weight:800;margin:10px 0 6px;color:#fff}
.dhero .hl{color:#9fc6ae;font-size:14.5px}
.hstat{display:flex;gap:26px;justify-content:center;margin-top:18px}
.hstat>div{font-size:12px;color:#9fc6ae}
.hstat b{display:block;font-size:20px;color:#fff;font-weight:800}
.dsec{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.dsec h3{font-size:16px;color:var(--forest);margin-bottom:10px}
.dsec p{font-size:14.5px;color:#3a4f43;line-height:1.65}
.incl{list-style:none;display:grid;gap:8px}
.incl li{position:relative;padding-left:26px;font-size:14px;color:#28392f;line-height:1.5}
.incl li:before{content:"✓";position:absolute;left:0;top:0;color:var(--green-d);font-weight:800}
.join-band{background:linear-gradient(135deg,#173622,#1f4a30);color:#fff;border-radius:var(--radius);padding:22px;text-align:center;margin:8px 0 24px}
.join-band .big{font-size:20px;font-weight:800}
.join-band .sub{color:#bcd6c6;font-size:13.5px;margin:6px auto 16px;max-width:420px}
.sticky-cta{position:sticky;bottom:0;z-index:40;background:#fff;border-top:1px solid var(--line);box-shadow:0 -4px 18px rgba(12,26,18,.08);padding:12px 0}
.sticky-cta .wrap{display:flex;align-items:center;gap:12px}
.sticky-cta .prc{flex:none}
.back{background:none;border:none;color:var(--muted);font-weight:600;font-size:13.5px;cursor:pointer;padding:0;margin-bottom:14px;font-family:inherit}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14.5px}
.loading{text-align:center;color:var(--muted);padding:60px 20px;font-size:14.5px}
.share-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
/* footer */
footer{background:var(--forest);color:#bcd6c6;padding:34px 0;margin-top:30px;text-align:center}
footer .gym{color:#fff;font-weight:700;font-size:15px}
footer .ft-links{margin-top:12px;display:flex;gap:18px;justify-content:center;flex-wrap:wrap;font-size:13px}
footer a{color:#9fc6ae;text-decoration:none}
footer a:hover{color:#fff}
footer .fine{margin-top:14px;font-size:11.5px;color:#6f8a79}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--forest);color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;z-index:200;box-shadow:0 8px 24px rgba(12,26,18,.3);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
</style>
</head>

<main><div class="wrap"><div id="app"><div class="loading">Loading…</div></div></div></main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('https://hrftsfjjtaclqnmaurfd.supabase.co','sb_publishable_ieqRtgpUZQXOwuaVQ6GNkQ_lS727Rtz');
const APP='https://app.mind.us';
const $=id=>document.getElementById(id);

/* ---- helpers ---- */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function initial(n){n=(n||'').trim();return n?esc(n[0].toUpperCase()):'◆';}
function ratingHtml(r){r=(r==null)?null:Number(r);if(r&&r>0)return '<span class="star">★</span> <span style="font-size:12px;color:var(--muted)">'+r.toFixed(1)+'</span>';return '<span class="new">NEW</span>';}
function fmtDate(d){if(!d)return '';try{return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch(e){return '';}}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2600);}

/* referral: capture ?ref= and persist, append to all join links */
const params=new URLSearchParams(location.search);
let REF=params.get('ref')||'';
try{if(REF)localStorage.setItem('mos_ref',REF);else REF=localStorage.getItem('mos_ref')||'';}catch(e){}
function joinUrl(extra){let u=APP+'/?';const q=[];if(REF)q.push('ref='+encodeURIComponent(REF));if(extra)q.push(extra);return APP+'/'+(q.length?('?'+q.join('&')):'');}
function setJoinLinks(extra){const u=joinUrl(extra);const tj=$('topJoin'),fj=$('ftJoin');if(tj)tj.href=u;if(fj)fj.href=u;return u;}

/* avatar signed url (private bucket; public-coach RLS allows anon select) */
const avCache={};
async function avatarUrl(path){if(!path)return null;if(avCache[path]!==undefined)return avCache[path];try{const r=await sb.storage.from('avatars').createSignedUrl(path,3600);avCache[path]=(r&&r.data&&r.data.signedUrl)||null;}catch(e){avCache[path]=null;}return avCache[path];}
function fillAvatars(scope){(scope||document).querySelectorAll('[data-av]').forEach(box=>{const p=box.getAttribute('data-av');if(!p)return;avatarUrl(p).then(u=>{if(u)box.innerHTML='<img src="'+u+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">';});});}

/* SEO injection */
function setMeta(name,val,attr){attr=attr||'name';let el=document.head.querySelector('meta['+attr+'="'+name+'"]');if(!el){el=document.createElement('meta');el.setAttribute(attr,name);document.head.appendChild(el);}el.setAttribute('content',val);}
function setCanonical(href){let el=document.head.querySelector('link[rel="canonical"]');if(el)el.setAttribute('href',href);setMeta('og:url',href,'property');}
function setSeo(o){if(o.title){document.title=o.title;setMeta('og:title',o.title,'property');setMeta('twitter:title',o.title);}if(o.desc){setMeta('description',o.desc);setMeta('og:description',o.desc,'property');setMeta('twitter:description',o.desc);}if(o.url)setCanonical(o.url);if(o.image){setMeta('og:image',o.image,'property');setMeta('twitter:image',o.image);}}
function setLd(obj){let s=$('ld-page');if(!s){s=document.createElement('script');s.type='application/ld+json';s.id='ld-page';document.head.appendChild(s);}s.textContent=JSON.stringify(obj);}

/* ---- card builders ---- */
function coachCard(c){
  const tags=(Array.isArray(c.expertise)?c.expertise:[]).slice(0,4).map(t=>'<span class="tag">'+esc(t)+'</span>').join('');
  const pods=c.pod_count||0,spots=c.spots_open||0;
  return '<a class="card" href="/'+encodeURIComponent(c.coach_slug)+'" style="text-decoration:none">'
   +'<div class="cm"><div class="av lg" data-av="'+esc(c.avatar||'')+'">'+initial(c.alias)+'</div>'
   +'<div><b>'+esc(c.alias||'Coach')+'</b><span>'+esc(c.headline||'Coach')+'</span>'
   +'<div style="margin-top:3px">'+ratingHtml(c.rating)+(c.members_coached?' <span style="font-size:11px;color:var(--muted)">· '+c.members_coached+' coached</span>':'')+'</div></div></div>'
   +(tags?'<div class="tags">'+tags+'</div>':'')
   +'<div class="fr"><span style="font-size:12px;color:#2a6b4d;font-weight:700">'+pods+' POD'+(pods===1?'':'s')+' · '+spots+' spot'+(spots===1?'':'s')+' open</span>'
   +'<span class="btn g sm">View profile</span></div></a>';
}
function podCard(p){
  const seats=p.seats||14,taken=p.seats_taken||0,left=(p.spots_left!=null?p.spots_left:Math.max(0,seats-taken));
  const pct=Math.min(100,Math.round((taken/Math.max(1,seats))*100));const full=left<=0;
  const seatTxt=full?'Full':left+' seat'+(left===1?'':'s')+' left';
  const startTxt=p.start_date?(' · starts '+fmtDate(p.start_date)):'';
  const href='/'+encodeURIComponent(p.coach_slug)+'/'+encodeURIComponent(p.slug);
  return '<a class="card" href="'+href+'" style="text-decoration:none">'
   +'<div class="cm"><div class="av" data-av="'+esc(p.coach_avatar||'')+'">'+initial(p.coach_alias)+'</div><div><b>'+esc(p.coach_alias||'Coach')+'</b><span>'+esc(p.coach_headline||'Coach')+'</span></div></div>'
   +(p.focus?'<span class="pill">'+esc(p.focus)+'</span>':'')
   +'<div class="ptitle">'+esc(p.name)+'</div>'
   +(p.description?'<div class="pout">'+esc(p.description)+'</div>':'')
   +'<div class="meta">◷ '+esc(p.cadence||'Schedule TBA')+startTxt+'</div>'
   +'<div class="meta">'+ratingHtml(p.rating)+(p.coach_members_coached?' <span style="font-size:11px;color:var(--muted)">· '+p.coach_members_coached+' coached</span>':'')+'</div>'
   +'<div class="seatbar"><i style="width:'+pct+'%"></i></div>'
   +'<div class="seatlbl"><span>'+taken+' of '+seats+' joined</span><b>'+seatTxt+'</b></div>'
   +'<div class="fr"><div class="prc">$250<span>/mo</span></div><span class="btn p sm">Learn more</span></div></a>';
}

/* ---- views ---- */
async function viewDirectory(){
  setJoinLinks();
  setSeo({title:'Coaches on Mind OS — a gym for your mind',desc:'Browse coaches and coach-led PODs on Mind OS. Measure your Q4 quality of life, then grow it a little every day with a coach and a crew.',url:'https://coaches.mind.us/',image:APP+'/landing/og-image.png'});
  setLd({"@context":"https://schema.org","@type":"CollectionPage","name":"Coaches on Mind OS","url":"https://coaches.mind.us/","about":{"@type":"Organization","name":"Mind OS"}});
  let coaches=[],pods=[];
  try{const r=await sb.rpc('marketplace_coaches');coaches=r.data||[];}catch(e){}
  try{const r=await sb.rpc('marketplace_pods');pods=r.data||[];}catch(e){}
  let html=''
   +'<section class="hero" style="margin:-30px -18px 26px;border-radius:0">'
   +'<div class="wrap"><div class="eyebrow">Mind OS · a gym for your mind</div>'
   +'<h1>Find a coach who moves your number</h1>'
   +'<p>Measure your Q4 quality of life, then grow it a little every day with a coach and a crew who have your back.</p>'
   +'<div class="cta"><a class="btn p lg" href="'+joinUrl()+'">Start free</a></div></div></section>';
  if(coaches.length){
    html+='<div class="sec"><h2>Coaches</h2><div class="grid">'+coaches.map(coachCard).join('')+'</div></div>';
  }
  if(pods.length){
    html+='<div class="sec"><h2>Open PODs</h2><div class="grid">'+pods.map(podCard).join('')+'</div></div>';
  }
  if(!coaches.length&&!pods.length){
    html+='<div class="empty">No coaches listed yet. <a href="'+joinUrl()+'" style="color:var(--green-d);font-weight:700">Start free on Mind OS</a> and grow your Q4 a little every day.</div>';
  }
  $('app').innerHTML=html;fillAvatars($('app'));
}

async function viewCoach(slug){
  let c=null;
  try{const r=await sb.rpc('coach_profile',{p_slug:slug});c=(r.data&&r.data[0])||null;}catch(e){}
  if(!c){return view404('That coach page isn’t available.');}
  let pods=[];
  try{const r=await sb.rpc('marketplace_pods');pods=(r.data||[]).filter(p=>p.coach_slug===slug);}catch(e){}
  const url='https://coaches.mind.us/'+slug;
  setJoinLinks();
  setSeo({title:esc(c.alias||'Coach')+' — Coach on Mind OS',desc:(c.headline?c.headline+'. ':'')+'Coaching on Mind OS, a gym for your mind. Measure your Q4 quality of life, then grow it a little every day.',url:url,image:APP+'/landing/og-image.png'});
  setLd({"@context":"https://schema.org","@type":"Person","name":c.alias||'Coach',"jobTitle":"Coach","description":c.headline||'Coach on Mind OS',"knowsAbout":Array.isArray(c.expertise)?c.expertise:[],"worksFor":{"@type":"Organization","name":"Mind OS","url":"https://mind.us"},"url":url});
  const tags=(Array.isArray(c.expertise)?c.expertise:[]).map(t=>'<span class="tag">'+esc(t)+'</span>').join('');
  const podHtml=pods.length?('<div class="grid">'+pods.map(podCard).join('')+'</div>'):'<div class="empty" style="padding:24px">No open PODs right now.</div>';
  $('app').innerHTML=''
   +'<button class="back" onclick="location.href=\'/\'">← All coaches</button>'
   +'<div class="dhero ctr"><div class="av xl" data-av="'+esc(c.avatar||'')+'" style="margin:0 auto">'+initial(c.alias)+'</div>'
   +'<h1>'+esc(c.alias||'Coach')+'</h1><div class="hl">'+esc(c.headline||'')+'</div>'
   +'<div class="hstat"><div><b>'+(c.rating?Number(c.rating).toFixed(1)+'★':'New')+'</b>rating</div><div><b>'+(c.members_coached||0)+'</b>coached</div><div><b>'+(c.pod_count||0)+'</b>live PODs</div></div></div>'
   +(c.bio?'<div class="dsec"><h3>About</h3><p>'+esc(c.bio)+'</p></div>':'')
   +(tags?'<div class="dsec"><h3>Coaches you on</h3><div class="tags">'+tags+'</div></div>':'')
   +'<div class="dsec"><h3>'+esc(c.alias||'Their')+'’s PODs</h3>'+podHtml+'</div>'
   +'<div class="join-band"><div class="big">Train your mind with '+esc(c.alias||'a coach')+'</div>'
   +'<div class="sub">Create your free Mind OS account, measure your Q4, then join a POD to grow it with a coach and a crew.</div>'
   +'<a class="btn p lg" href="'+joinUrl()+'">Start free on Mind OS</a></div>';
  fillAvatars($('app'));
}

async function viewPod(coachSlug,podSlug){
  let p=null;
  try{const r=await sb.rpc('pod_detail',{p_coach_slug:coachSlug,p_pod_slug:podSlug});p=(r.data&&r.data[0])||null;}catch(e){}
  if(!p){return view404('That POD isn’t available.');}
  const seats=p.seats||14,taken=p.seats_taken||0,left=(p.spots_left!=null?p.spots_left:Math.max(0,seats-taken));const full=left<=0;
  const startTxt=p.start_date?('Starts '+fmtDate(p.start_date)+' · '):'';
  const url='https://coaches.mind.us/'+coachSlug+'/'+podSlug;
  const podJoin=joinUrl('pod='+encodeURIComponent(coachSlug+'/'+podSlug));
  setJoinLinks('pod='+encodeURIComponent(coachSlug+'/'+podSlug));
  setSeo({title:esc(p.name)+' with '+esc(p.coach_alias||'a coach')+' — Mind OS POD',desc:(p.description?p.description:'A coach-led POD on Mind OS')+' Join the crew and grow your Q4 a little every day.',url:url,image:APP+'/landing/og-image.png'});
  setLd({"@context":"https://schema.org","@type":"Course","name":p.name,"description":p.description||'A coach-led POD on Mind OS',"provider":{"@type":"Organization","name":"Mind OS","url":"https://mind.us"},"hasCourseInstance":{"@type":"CourseInstance","courseMode":"online","courseWorkload":p.cadence||"Weekly"},"offers":{"@type":"Offer","price":"250","priceCurrency":"USD","category":"Subscription","url":url}});
  $('app').innerHTML=''
   +'<button class="back" onclick="location.href=\'/'+esc(coachSlug)+'\'">← '+esc(p.coach_alias||'Coach')+'’s profile</button>'
   +'<div class="dhero">'+(p.focus?'<span class="pill" style="background:rgba(255,255,255,.12);color:#bdf0d2">'+esc(p.focus)+'</span>':'')
   +'<h1>'+esc(p.name)+'</h1>'
   +'<div class="cm" style="margin-top:8px"><div class="av" data-av="'+esc(p.coach_avatar||'')+'">'+initial(p.coach_alias)+'</div><div><b style="color:#fff">with '+esc(p.coach_alias||'your coach')+'</b><span style="color:#9fc6ae">'+esc(p.coach_headline||'')+'</span></div></div>'
   +'<div style="font-size:12.5px;color:#ffd9b0;margin-top:10px;font-weight:600">◷ '+startTxt+(full?'currently full':'only '+left+' of '+seats+' seats left')+'</div></div>'
   +(p.description?'<div class="dsec"><h3>What you’ll do</h3><p>'+esc(p.description)+'</p></div>':'')
   +'<div class="dsec"><h3>What’s included</h3><ul class="incl">'
   +'<li>Weekly live group session ('+esc(p.cadence||'schedule shared on join')+')</li>'
   +'<li>A crew of up to '+seats+' chasing similar goals</li>'
   +'<li>Your coach’s guidance, with your Q4 progress tracked</li>'
   +'<li>An accountability partner between sessions</li>'
   +'<li>Everything in Advanced (your AI coach, tailored skills, nudges)</li></ul></div>'
   +'<div class="dsec"><h3>Meet your coach</h3><div class="cm"><div class="av lg" data-av="'+esc(p.coach_avatar||'')+'">'+initial(p.coach_alias)+'</div><div><b style="color:var(--forest)">'+esc(p.coach_alias||'Coach')+'</b><span>'+esc(p.coach_headline||'')+'</span><div style="margin-top:3px">'+ratingHtml(p.rating)+(p.coach_members_coached?' <span style="font-size:11px;color:var(--muted)">· '+p.coach_members_coached+' coached</span>':'')+'</div></div></div>'
   +'<a class="btn g sm" href="/'+esc(coachSlug)+'" style="margin-top:12px;width:fit-content">View full coach profile</a></div>'
   +'<div class="join-band"><div class="big">Join this POD</div><div class="sub">PODs are part of Mind OS Community, $250/mo, cancel anytime. Create your free account, then join '+esc(p.coach_alias||'your coach')+'’s crew.</div>'
   +'<a class="btn p lg" href="'+podJoin+'">'+(full?'Join the waitlist':'Join this POD →')+'</a></div>';
  // sticky CTA bar
  const bar=document.createElement('div');bar.className='sticky-cta';
  bar.innerHTML='<div class="wrap"><div class="prc">$250<span>/mo</span><div style="font-size:10.5px;color:var(--muted)">cancel anytime</div></div><a class="btn p" style="flex:1" href="'+podJoin+'">'+(full?'Join the waitlist':'Join this POD →')+'</a></div>';
  document.body.appendChild(bar);
  fillAvatars($('app'));
}

function view404(msg){
  setSeo({title:'Mind OS — a gym for your mind',desc:'Find a coach and a POD on Mind OS.',url:'https://coaches.mind.us/'});
  $('app').innerHTML='<div class="empty">'+esc(msg||'Page not found.')+'<br><br><a class="btn p" href="/">Browse all coaches</a> &nbsp; <a class="btn g" href="'+joinUrl()+'">Start free</a></div>';
}

/* ---- router ---- */
function route(){
  // strip leading/trailing slashes, drop a trailing .html, ignore query
  let path=location.pathname.replace(/^\/+|\/+$/g,'');
  path=path.replace(/\.html$/i,'');
  const parts=path?path.split('/').filter(Boolean):[];
  if(parts.length===0||parts[0]===''||parts[0]==='coaches'){return viewDirectory();}
  if(parts.length===1){return viewCoach(decodeURIComponent(parts[0]));}
  return viewPod(decodeURIComponent(parts[0]),decodeURIComponent(parts[1]));
}
route();
</script>
